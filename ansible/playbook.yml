---
- name: Deploy node app on EC2
  hosts: all
  become: yes
  vars:
    app_dir: /opt/app
    app_port: 3000
    app_name: nodeappt2
    node_env_database_url: ""
    node_env_mongo_uri: ""
    node_env_db_host: ""
    node_env_db_port: ""
    node_env_db_name: ""
    node_env_db_user: ""
    node_env_db_password: ""
    install_db: ""
    db_type: ""
    db_name: ""
    db_username: ""
    db_password: ""

  handlers:
    - name: restart nginx
      service:
        name: nginx
        state: restarted
        enabled: yes

    - name: reload systemd
      systemd:
        daemon_reload: yes

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install required packages
      apt:
        name:
          - curl
          - git
          - nginx
          - gnupg
          - ca-certificates
        state: present

    - name: Install Node.js 20.x
      shell: |
        curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
        apt-get install -y nodejs
      args:
        creates: /usr/bin/node

    - name: Install PM2 globally
      npm:
        name: pm2
        global: yes
        state: present

    - name: Create app directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: "0755"

    - name: Install PostgreSQL
      when: install_db | default('') | string | lower == 'true' and db_type | default('') | string | lower == 'postgres'
      block:
        - name: Install PostgreSQL packages
          apt:
            name:
              - postgresql
              - postgresql-contrib
              - libpq-dev
            state: present

        - name: Start and enable PostgreSQL
          service:
            name: postgresql
            state: started
            enabled: yes

        - name: Set pg_hba to md5 auth
          shell: |
            PG_HBA=$(find /etc/postgresql -name pg_hba.conf | head -1)
            sed -i 's/^local\s\+all\s\+all\s\+peer/local all all md5/' "$PG_HBA"
            sed -i 's/^host\s\+all\s\+all\s\+127\.0\.0\.1\/32\s\+ident/host all all 127.0.0.1\/32 md5/' "$PG_HBA"
            sed -i 's/^host\s\+all\s\+all\s\+::1\/128\s\+ident/host all all ::1\/128 md5/' "$PG_HBA"
          notify: reload systemd

        - name: Restart PostgreSQL after pg_hba change
          service:
            name: postgresql
            state: restarted

        - name: Create PostgreSQL database and user
          shell: |
            DB_NAME="{{ db_name if db_name else node_env_db_name }}"
            DB_USER="{{ db_username if db_username else node_env_db_user }}"
            DB_PASS="{{ db_password if db_password else node_env_db_password }}"
            sudo -u postgres psql -tc "SELECT 1 FROM pg_roles WHERE rolname='${DB_USER}'" | grep -q 1 || \
              sudo -u postgres psql -c "CREATE USER ${DB_USER} WITH PASSWORD '${DB_PASS}';"
            sudo -u postgres psql -tc "SELECT 1 FROM pg_database WHERE datname='${DB_NAME}'" | grep -q 1 || \
              sudo -u postgres psql -c "CREATE DATABASE ${DB_NAME} OWNER ${DB_USER};"
            sudo -u postgres psql -c "GRANT ALL PRIVILEGES ON DATABASE ${DB_NAME} TO ${DB_USER};"
          when: (db_name | default('') != '' or node_env_db_name | default('') != '') and (db_username | default('') != '' or node_env_db_user | default('') != '')

    - name: Install MySQL
      when: install_db | default('') | string | lower == 'true' and db_type | default('') | string | lower == 'mysql'
      block:
        - name: Install MySQL packages
          apt:
            name:
              - mysql-server
              - mysql-client
              - libmysqlclient-dev
            state: present

        - name: Start and enable MySQL
          service:
            name: mysql
            state: started
            enabled: yes

        - name: Create MySQL database and user
          shell: |
            DB_NAME="{{ db_name if db_name else node_env_db_name }}"
            DB_USER="{{ db_username if db_username else node_env_db_user }}"
            DB_PASS="{{ db_password if db_password else node_env_db_password }}"
            mysql -u root -e "CREATE DATABASE IF NOT EXISTS \`${DB_NAME}\`;"
            mysql -u root -e "CREATE USER IF NOT EXISTS '${DB_USER}'@'localhost' IDENTIFIED BY '${DB_PASS}';"
            mysql -u root -e "GRANT ALL PRIVILEGES ON \`${DB_NAME}\`.* TO '${DB_USER}'@'localhost';"
            mysql -u root -e "FLUSH PRIVILEGES;"
          when: (db_name | default('') != '' or node_env_db_name | default('') != '') and (db_username | default('') != '' or node_env_db_user | default('') != '')

    - name: Install MongoDB
      when: install_db | default('') | string | lower == 'true' and db_type | default('') | string | lower == 'mongodb'
      block:
        - name: Add MongoDB apt key
          shell: |
            curl -fsSL https://www.mongodb.org/static/pgp/server-7.0.asc | \
              gpg --dearmor -o /usr/share/keyrings/mongodb-server-7.0.gpg
          args:
            creates: /usr/share/keyrings/mongodb-server-7.0.gpg

        - name: Add MongoDB apt repository
          copy:
            content: |
              deb [ arch=amd64,arm64 signed-by=/usr/share/keyrings/mongodb-server-7.0.gpg ] https://repo.mongodb.org/apt/ubuntu jammy/mongodb-org/7.0 multiverse
            dest: /etc/apt/sources.list.d/mongodb-org-7.0.list
            mode: "0644"

        - name: Update apt cache after adding MongoDB repo
          apt:
            update_cache: yes

        - name: Install MongoDB
          apt:
            name: mongodb-org
            state: present

        - name: Start and enable MongoDB
          service:
            name: mongod
            state: started
            enabled: yes

        - name: Initialize MongoDB database
          shell: |
            DB_NAME="{{ db_name if db_name else node_env_db_name }}"
            DB_USER="{{ db_username if db_username else node_env_db_user }}"
            DB_PASS="{{ db_password if db_password else node_env_db_password }}"
            mongosh --quiet --eval "
              use ${DB_NAME};
              if (db.getUser('${DB_USER}') === null) {
                db.createUser({
                  user: '${DB_USER}',
                  pwd: '${DB_PASS}',
                  roles: [{ role: 'readWrite', db: '${DB_NAME}' }]
                });
                print('User created');
              } else {
                print('User already exists');
              }
            "
          when: (db_name | default('') != '' or node_env_db_name | default('') != '') and (db_username | default('') != '' or node_env_db_user | default('') != '')

    - name: Pull app from GitHub
      git:
        repo: "https://github.com/{{ lookup('env', 'GITHUB_REPOSITORY') }}.git"
        dest: "{{ app_dir }}"
        version: HEAD
        force: yes
      environment:
        GIT_TERMINAL_PROMPT: "0"
      become: yes
      become_user: ubuntu

    - name: Write .env file
      copy:
        dest: "{{ app_dir }}/.env"
        owner: ubuntu
        group: ubuntu
        mode: "0600"
        content: |
          {% if node_env_database_url %}DATABASE_URL={{ node_env_database_url }}
          {% endif %}
          {% if node_env_mongo_uri %}MONGO_URI={{ node_env_mongo_uri }}
          {% endif %}
          {% if node_env_db_host %}DB_HOST={{ node_env_db_host }}
          {% endif %}
          {% if node_env_db_port %}DB_PORT={{ node_env_db_port }}
          {% endif %}
          {% if node_env_db_name %}DB_NAME={{ node_env_db_name }}
          {% endif %}
          {% if node_env_db_user %}DB_USER={{ node_env_db_user }}
          {% endif %}
          {% if node_env_db_password %}DB_PASSWORD={{ node_env_db_password }}
          {% endif %}
          NODE_ENV=production

    - name: Install npm dependencies
      npm:
        path: "{{ app_dir }}"
        state: present
      become: yes
      become_user: ubuntu

    - name: Run build script if present
      shell: |
        if [ -f "package.json" ] && grep -q '"build"' "package.json"; then
          npm run build
        else
          echo "No build script found, skipping."
        fi
      args:
        chdir: "{{ app_dir }}"
      become: yes
      become_user: ubuntu

    - name: Start app with PM2
      shell: |
        pm2 delete app 2>/dev/null || true
        set -a
        [ -f "{{ app_dir }}/.env" ] && . "{{ app_dir }}/.env"
        export PORT="${PORT:-3000}"
        export HOST="${HOST:-0.0.0.0}"
        set +a
        if [ -f "{{ app_dir }}/package.json" ] && grep -q '"start"' "{{ app_dir }}/package.json"; then
          pm2 start npm --name app --update-env -- start
        elif [ -f "{{ app_dir }}/server.js" ]; then
          pm2 start "{{ app_dir }}/server.js" --name app --update-env
        elif [ -f "{{ app_dir }}/index.js" ]; then
          pm2 start "{{ app_dir }}/index.js" --name app --update-env
        elif [ -f "{{ app_dir }}/app.js" ]; then
          pm2 start "{{ app_dir }}/app.js" --name app --update-env
        else
          echo "No Node entrypoint found in {{ app_dir }}" >&2
          exit 1
        fi
        pm2 save
      args:
        chdir: "{{ app_dir }}"
      become: yes
      become_user: ubuntu

    - name: Install PM2 systemd startup service
      shell: |
        env PATH=$PATH:/usr/bin pm2 startup systemd -u ubuntu --hp /home/ubuntu
      args:
        creates: /etc/systemd/system/pm2-ubuntu.service

    - name: Wait for app to be reachable on port 3000
      wait_for:
        host: 127.0.0.1
        port: "{{ app_port }}"
        delay: 10
        timeout: 120
        state: started
      ignore_errors: yes
      register: port_wait

    - name: Print PM2 logs if app did not start
      command: pm2 logs app --lines 100 --nostream
      register: pm2_logs
      when: port_wait is failed
      become: yes
      become_user: ubuntu
      changed_when: false

    - name: Show PM2 logs
      debug:
        msg: "{{ pm2_logs.stdout_lines | default(['No logs captured']) }}"
      when: port_wait is failed

    - name: Fail if app did not start
      fail:
        msg: >
          App did not start on port {{ app_port }} within 120 seconds.
          Check the PM2 logs above. Common causes: missing build step,
          crashed script, or mismatched port.
      when: port_wait is failed

    - name: Configure nginx reverse proxy
      copy:
        dest: /etc/nginx/sites-enabled/app
        mode: "0644"
        content: |
          server {
              listen 80;
              server_name _;
              location / {
                  proxy_pass http://127.0.0.1:{{ app_port }};
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection 'upgrade';
                  proxy_set_header Host $host;
                  proxy_cache_bypass $http_upgrade;
              }
          }
      notify: restart nginx

    - name: Remove default nginx config
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: restart nginx

    - name: Ensure nginx is started and enabled
      service:
        name: nginx
        state: started
        enabled: yes

    - name: Report server IP
      debug:
        msg: "server_ip={{ ansible_host }}"